# \u0413\u043B\u043E\u0431\u0430\u043B\u044C\u043D\u044B\u0435 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438
handlers=java.util.logging.ConsoleHandler

# \u0423\u0440\u043E\u0432\u0435\u043D\u044C \u043B\u043E\u0433\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u044F \u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E
.level=INFO

# \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 ConsoleHandler
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s %5$s%6$s%n

# \u041F\u043E\u043B\u043D\u043E\u0441\u0442\u044C\u044E \u043E\u0442\u043A\u043B\u044E\u0447\u0430\u0435\u043C \u043B\u043E\u0433\u0433\u0435\u0440 \u0434\u043B\u044F \u043A\u0443\u043A\u0438
org.apache.http.client.protocol.ResponseProcessCookies.level=OFF
org.apache.http.level=SEVERE
org.apache.http.wire.level=OFF
org.apache.http.headers.level=OFF
org.apache.http.client.level=SEVERE